<body>
    <header>
        <a href="index.html" class="logo">SomaVitabu</a>
        <nav>
            <ul>
                <li><a href="index.html">Mwanzo</a></li>

    <div class="container">
        <h2 class="section-title">Wasiliana Nasi</h2>
        
        <!-- Fomu ya Mawasiliano -->
        <div class="form-container">
            <form action="#">
                <div class="form-group">
                    <label for="jina">Jina Lako:</label>
                    <input type="text" id="jina" placeholder="Ingiza jina lako hapa" required>
                </div>
                <div class="form-group">
                    <label for="barua">Barua Pepe (Email):</label>
                    <input type="email" id="barua" placeholder="mfano@email.com" required>
                </div>
                <div class="form-group">
                    <label for="ujumbe">Ujumbe Wako:</label>
                    <textarea id="ujumbe" rows="5" placeholder="Andika ujumbe au swali lako hapa" required></textarea>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Tuma Ujumbe</button>
            </form>
        </div>
        
        <div style="text-align: center; margin-top: 2rem;">
            <p><strong>Namba ya Simu:</strong> +255 700 000 000</p>
            <p><strong>Barua Pepe:</strong> info@somavitabu.co.tz</p>
            <p><strong>Eneo Letu:</strong> Dar es Salaam, Tanzania</p>
        </div>
    </div>

    <footer>
