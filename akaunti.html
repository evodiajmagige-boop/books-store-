            <ul>

    <div class="container">
        <h2 class="section-title">Ingia Kwenye Akaunti</h2>
        
        <!-- Fomu ya Kuingia (Login Form) -->
        <div class="form-container">
            <form action="#">
                <div class="form-group">
                    <label for="barua">Barua Pepe (Email):</label>
                    <input type="email" id="barua" placeholder="mfano@email.com" required>
                </div>
                <div class="form-group">
                    <label for="nywila">Nywila (Password):</label>
                    <input type="password" id="nywila" placeholder="********" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Ingia</button>
                
                <p style="text-align: center; margin-top: 1.5rem;">
                    Hauna akaunti? <a href="#" style="color: var(--primary-color); font-weight: bold;">Jisajili Hapa</a>.
                </p>
            </form>
        </div>
    </div>

    <footer>
